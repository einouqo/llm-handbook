name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Enable devenv cache
        uses: cachix/cachix-action@v17
        with:
          name: devenv

      - name: Install devenv.sh
        run: |
          nix profile add nixpkgs#devenv

      - name: Build site (HTML + PDF)
        shell: devenv shell bash -- -e {0}
        run: |
          make html
          make pdf
          cp dist/llm-handbook.pdf site/llm-handbook.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
