name: Release PDF

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*-*"
      - "v[0-9]*.[0-9]*.[0-9]*+*"
      - "v[0-9]*.[0-9]*.[0-9]*-*+*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: devenv shell bash -- -e {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: "nix"

      - name: Enable devenv cache
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv.sh
        shell: bash
        run: |
          nix profile add nixpkgs#devenv

      - name: Build PDF
        run: |
          make pdf

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/llm-handbook.pdf
